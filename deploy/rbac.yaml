apiVersion: v1
kind: ServiceAccount
metadata:
  name: attestation-service
  namespace: kubevirt
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: attestation-service
rules:
  # Read ConfigMaps for reference values
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update"]
  # Read AttestationPolicy CRDs
  - apiGroups: ["trustfncall.io"]
    resources: ["attestationpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: attestation-service
subjects:
  - kind: ServiceAccount
    name: attestation-service
    namespace: kubevirt
roleRef:
  kind: ClusterRole
  name: attestation-service
  apiGroup: rbac.authorization.k8s.io
