apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: attestationpolicies.trustfncall.io
spec:
  group: trustfncall.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                imageSelector:
                  type: object
                  description: "Selects which container images this policy applies to"
                  properties:
                    imageNames:
                      type: array
                      items:
                        type: string
                      description: "Container image name patterns (glob)"
                    imageDigests:
                      type: array
                      items:
                        type: string
                      description: "Container image digests (sha256:...)"
                referenceValues:
                  type: array
                  description: "Expected file measurements for the container"
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                        description: "Expected file path in the container"
                      expectedDigest:
                        type: string
                        description: "Expected SHA-384 digest (hex-encoded)"
                      required:
                        type: boolean
                        description: "Whether this file must be present"
                        default: false
                heartbeatPolicy:
                  type: object
                  description: "Heartbeat liveness policy"
                  properties:
                    timeoutSeconds:
                      type: integer
                      minimum: 10
                      default: 90
                      description: "Max seconds between heartbeats"
                    action:
                      type: string
                      enum: ["alert", "restart", "kill"]
                      default: "alert"
                      description: "Action on heartbeat timeout"
                enforcementAction:
                  type: string
                  enum: ["enforce", "audit", "disabled"]
                  default: "audit"
                  description: "What to do when verdict is UNTRUSTED"
  scope: Namespaced
  names:
    plural: attestationpolicies
    singular: attestationpolicy
    kind: AttestationPolicy
    shortNames:
      - atp
