apiVersion: apps/v1
kind: Deployment
metadata:
  name: attestation-service
  namespace: kubevirt
  labels:
    app: attestation-service
    app.kubernetes.io/component: attestation
    app.kubernetes.io/part-of: trustfncall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attestation-service
  template:
    metadata:
      labels:
        app: attestation-service
    spec:
      serviceAccountName: attestation-service
      # Pod runs in the host network namespace so it can reach the host's
      # PCCS daemon at https://localhost:8081 for DCAP collateral. The
      # SGX/TDX DCAP libraries (libsgx-dcap-quote-verify) baked into the
      # image don't traverse a pod->host gateway cleanly.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: attestation-service
          # Image is built locally (see infra/attestation-service/Dockerfile +
          # tdx-guest/build-all.sh) and imported into k3s containerd via:
          #   docker save | sudo k3s ctr -n k8s.io images import -
          image: localhost/trustweave-attestation-service:latest
          imagePullPolicy: IfNotPresent
          args:
            # Quote signature verification path: real Intel DCAP via
            # libsgx-dcap-quote-verify + PCCS at localhost:8081.
            # The earlier --insecure-skip-quote-verify bypass has been removed.
            - --addr=0.0.0.0:50051
            - --reference-store-path=/tmp/reference-values.json
            # TCB allow-list (MRTD + RTMR[0..2]) loaded from configmap.
            # Without this flag the verifier is fail-open on the kernel-
            # genuineness dimension; warned about loudly at startup.
            - --tcb-ref-path=/etc/attestation-service/tcb.json
          ports:
            - containerPort: 50051
              name: grpc
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: tcb-ref
              mountPath: /etc/attestation-service
              readOnly: true
      volumes:
        - name: tcb-ref
          configMap:
            name: as-tcb-ref
