//
// gRPC service definition for the Attestation Service (Verifier).
// This is the external Verifier in the IETF RATS architecture (RFC 9334).
// It receives evidence from the CVM Agent (via virt-handler), verifies it
// against reference values, and issues attestation result tokens.

syntax = "proto3";

package attestation.v1;

option go_package = "github.com/trustfncall/attestation-service/proto/v1;attestationv1";

// AttestationService is the Verifier in IETF RATS architecture.
service AttestationService {
  // VerifyWorkload verifies attestation evidence for a workload identified
  // by its stable workload_id. Inputs come from trustd.AttestWorkload and
  // include a TDX quote and the kernel's per-container event log. Returns
  // a verdict, per-check breakdown, and an attestation token on success.
  rpc VerifyWorkload(VerifyWorkloadRequest) returns (VerifyWorkloadResponse);

  // SetReferenceValues uploads reference values for a container image.
  // These are the "known good" measurements that evidence is compared against.
  rpc SetReferenceValues(SetReferenceValuesRequest) returns (SetReferenceValuesResponse);

  // GetReferenceValues retrieves reference values for a container image.
  rpc GetReferenceValues(GetReferenceValuesRequest) returns (ReferenceValues);

  // Health checks service health.
  rpc Health(HealthRequest) returns (HealthResponse);

  // UpdateLatestVerdict force-updates latest verdicts for subjects.
  // Used for fast revocation paths such as heartbeat loss or remediation state.
  rpc UpdateLatestVerdict(UpdateLatestVerdictRequest) returns (UpdateLatestVerdictResponse);

  // GetLatestVerdict returns the latest verifier verdict for a subject
  // (for example: "cgroup://<path>" or container image).
  rpc GetLatestVerdict(GetLatestVerdictRequest) returns (GetLatestVerdictResponse);

  // WatchVerdictUpdates streams verifier verdict changes in real time.
  // Clients can use this to invalidate trust caches quickly on revocation.
  rpc WatchVerdictUpdates(WatchVerdictUpdatesRequest) returns (stream VerdictUpdate);
}

// Verdict is the trust verdict for a container.
enum Verdict {
  VERDICT_UNSPECIFIED = 0;
  VERDICT_TRUSTED = 1;
  VERDICT_UNTRUSTED = 2;
  VERDICT_STALE = 3;
  VERDICT_UNKNOWN = 4;
}

// VerifyWorkloadRequest carries per-workload evidence produced by trustd.
message VerifyWorkloadRequest {
  // Stable workload identity — the refstore lookup key. Must match the
  // `workload_id` used by trustd.AttestWorkload.
  string workload_id = 1;

  // Raw TDX quote bytes (signed by Intel DCAP; contains RTMR[0..3] + report_data).
  bytes td_quote = 2;

  // Bytes of the kernel's per-container event log at
  // /sys/kernel/security/ima/container_rtmr/<mangled-cgroup>. Single
  // JSON object per file.
  bytes event_log = 3;

  // Verifier-chosen nonce (hex-encoded). Must match what trustd used for
  // report_data construction.
  string nonce_hex = 4;

  // Peer public key bytes (empty = no channel binding).
  bytes peer_pk = 5;
}

// VerifyWorkloadResponse carries the verdict plus structured per-check breakdown.
message VerifyWorkloadResponse {
  Verdict verdict = 1;
  string message = 2;

  // JWT attestation result token (signed by this service) — empty if
  // the verdict is not TRUSTED.
  string attestation_token = 3;

  WorkloadVerificationDetails details = 4;

  // Policy-selected remediation action (`none|alert|restart|kill`).
  string policy_action = 5;
}

// WorkloadVerificationDetails provides insight into which subcheck failed.
message WorkloadVerificationDetails {
  bool quote_signature_valid = 1;
  bool quote_verification_skipped = 2;
  // RTMR[2] in the quote is an enrolled TCB reference (the kernel is genuine).
  bool tcb_matches = 3;
  // report_data = SHA384(nonce) || SHA384(peer_pk or 0s).
  bool report_data_valid = 4;

  int32 matched_count = 5;
  int32 unknown_count = 6;
  int32 missing_count = 7;
  bool all_required_present = 8;

  repeated string unknown_files = 9;
  repeated string missing_files = 10;
}

// SetReferenceValuesRequest uploads reference values for a container image.
message SetReferenceValuesRequest {
  // Container image reference (e.g., "docker.io/library/nginx:latest").
  string container_image = 1;

  // Reference values to store.
  ReferenceValues reference_values = 2;
}

// SetReferenceValuesResponse confirms the upload.
message SetReferenceValuesResponse {
  string message = 1;
}

// GetReferenceValuesRequest retrieves reference values.
message GetReferenceValuesRequest {
  string container_image = 1;
}

// ReferenceValues contains expected measurements for a container image.
message ReferenceValues {
  // Container image this applies to.
  string container_image = 1;

  // Individual file reference entries.
  repeated ReferenceEntry entries = 2;

  // Timestamp when these values were recorded.
  int64 created_at = 3;
}

// ReferenceEntry is a single expected file measurement.
message ReferenceEntry {
  // Expected file path in the container.
  string filename = 1;

  // Expected SHA-384 digest (hex-encoded).
  string expected_digest = 2;

  // Whether this file is required (must be present for TRUSTED verdict).
  bool required = 3;
}

// HealthRequest checks service health.
message HealthRequest {}

// HealthResponse returns health status.
message HealthResponse {
  string status = 1;
  string version = 2;
  int64 uptime_seconds = 3;
}

// UpdateLatestVerdictRequest force-updates latest verdicts for subjects.
message UpdateLatestVerdictRequest {
  // Subject identities, e.g. "cgroup://<path>".
  repeated string subjects = 1;
  Verdict verdict = 2;
  string message = 3;
  string policy_action = 4;
  string source = 5;
}

// UpdateLatestVerdictResponse confirms how many subjects were updated.
message UpdateLatestVerdictResponse {
  uint32 updated = 1;
}

// GetLatestVerdictRequest queries latest verdict for a subject.
message GetLatestVerdictRequest {
  // Subject identity, e.g. "cgroup://<path>".
  string subject = 1;
}

// GetLatestVerdictResponse contains the latest known verdict for a subject.
message GetLatestVerdictResponse {
  string subject = 1;
  Verdict verdict = 2;
  string message = 3;
  string policy_action = 4;
  string attestation_token = 5;
  int64 verified_at = 6;
  int64 expires_at = 7;
  uint64 version = 8;
  string source = 9;
}

// WatchVerdictUpdatesRequest subscribes to verdict updates.
message WatchVerdictUpdatesRequest {
  // Optional subject filter. Empty => all subjects.
  repeated string subjects = 1;

  // Optional minimum version cursor. Updates with version <= after_version
  // are omitted from the stream.
  uint64 after_version = 2;
}

// VerdictUpdate is emitted on each verdict change.
message VerdictUpdate {
  string subject = 1;
  Verdict verdict = 2;
  string message = 3;
  string policy_action = 4;
  string attestation_token = 5;
  int64 verified_at = 6;
  int64 expires_at = 7;
  uint64 version = 8;
  string source = 9;
}
